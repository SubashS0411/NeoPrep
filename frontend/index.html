<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeoPrep HUD</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="hud">
    <section class="panel">
      <h1>NeoPrep // Placement Copilot</h1>
      <p>Generate your 35-day roadmap</p>
      <textarea id="jd" placeholder="Paste Job Description"></textarea>
      <input id="email" placeholder="Email" />
      <input id="tier" placeholder="Target Tier" value="Tier-1" />
      <button id="generate">Generate Roadmap</button>
    </section>

    <section class="panel">
      <h2>Day Plan</h2>
      <pre id="output">No roadmap yet.</pre>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
